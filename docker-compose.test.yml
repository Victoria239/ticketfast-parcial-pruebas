services:
  db-test:
    image: postgres:16-alpine
    container_name: ticketfast-db-test
    environment:
      POSTGRES_USER: ticketfast
      POSTGRES_PASSWORD: ticketfast
      POSTGRES_DB: ticketfast_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketfast -d ticketfast_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-test:
    build: .
    container_name: ticketfast-api-test
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://ticketfast:ticketfast@db-test:5432/ticketfast_test
    ports:
      - "8001:8000"
